<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>Museum AR</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
    }

    #ar-container {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
      background: #000;
    }

    /* AR.js 默认把视频 z-index:-2 挂在 body 上，易被固定层盖住导致整屏发黑；由脚本移入 #ar-container 后使用下列样式 */
    #ar-container video#arjs-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    #ar-container canvas {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100% !important;
      height: 100% !important;
      object-fit: cover;
    }

    #top-tip {
      position: fixed;
      top: env(safe-area-inset-top, 0);
      left: 0;
      right: 0;
      z-index: 20;
      padding: 14px 16px 12px;
      text-align: center;
      color: #fff;
      font-size: 16px;
      letter-spacing: 0.5px;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.78), rgba(0, 0, 0, 0.28), rgba(0, 0, 0, 0));
      pointer-events: none;
    }

    #loading {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.88);
      color: #fff;
      text-align: center;
      padding: 20px;
    }

    #loading-card {
      width: min(88vw, 360px);
      background: rgba(18, 18, 18, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 12px;
      padding: 18px 16px 16px;
      backdrop-filter: blur(4px);
    }

    #loading-text {
      font-size: 15px;
      margin-bottom: 12px;
      color: #f0f0f0;
    }

    #progress-track {
      width: 100%;
      height: 9px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      overflow: hidden;
    }

    #progress-bar {
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #5de0e6, #7f7fd5);
      transition: width 0.22s ease;
    }

    #progress-label {
      margin-top: 8px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.86);
    }

    #close-btn {
      position: fixed;
      right: 12px;
      bottom: calc(12px + env(safe-area-inset-bottom, 0));
      z-index: 25;
      display: none;
      border: 1px solid rgba(255, 255, 255, 0.7);
      background: rgba(0, 0, 0, 0.58);
      color: #fff;
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 14px;
      line-height: 1;
      backdrop-filter: blur(3px);
    }

    #close-btn:active {
      transform: scale(0.98);
    }

    #boot {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(2px);
    }

    #start-btn {
      border: 1px solid rgba(255, 255, 255, 0.75);
      background: rgba(10, 10, 10, 0.82);
      color: #fff;
      border-radius: 999px;
      padding: 13px 22px;
      font-size: 16px;
    }

    /* 地址栏加 ?hint=1 时在画面下方显示识别状态（无需连电脑看控制台） */
    /* 识别成功后用 DOM 叠说明图（部分机型 WebGL 叠加看不见，此层必显） */
    #ar-screen-panel {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 23;
      align-items: center;
      justify-content: center;
      padding: calc(56px + env(safe-area-inset-top, 0)) 14px calc(72px + env(safe-area-inset-bottom, 0));
      box-sizing: border-box;
      pointer-events: none;
    }

    #ar-screen-panel.is-visible {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .ar-screen-frame {
      max-width: min(92vw, 440px);
      max-height: min(48vh, 400px);
      min-height: 120px;
      min-width: 120px;
      border: 3px solid rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      background: #111;
    }

    #ar-screen-err {
      display: none;
      max-width: min(92vw, 400px);
      padding: 14px 16px;
      font-size: 14px;
      line-height: 1.45;
      color: #fff;
      background: rgba(180, 40, 40, 0.92);
      border-radius: 10px;
      word-break: break-all;
    }

    #ar-screen-img {
      display: block;
      width: 100%;
      height: auto;
      min-height: 80px;
      max-height: min(44vh, 360px);
      object-fit: contain;
    }

    #scan-hint {
      display: none;
      position: fixed;
      left: 8px;
      right: 8px;
      bottom: calc(56px + env(safe-area-inset-bottom, 0));
      z-index: 22;
      padding: 10px 12px;
      font-size: 14px;
      line-height: 1.4;
      text-align: center;
      color: #fff;
      background: rgba(0, 0, 0, 0.72);
      border-radius: 10px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="ar-container"></div>
  <div id="top-tip">请扫描展品图片查看细节</div>
  <div id="scan-hint" aria-live="polite"></div>

  <div id="ar-screen-panel" aria-hidden="true">
    <div class="ar-screen-frame">
      <img id="ar-screen-img" alt="展品说明图" decoding="async" referrerpolicy="no-referrer" />
    </div>
    <p id="ar-screen-err" role="alert"></p>
  </div>

  <div id="loading">
    <div id="loading-card">
      <div id="loading-text">加载识别图中...</div>
      <div id="progress-track"><div id="progress-bar"></div></div>
      <div id="progress-label">0 / 124</div>
    </div>
  </div>
  <div id="boot">
    <button id="start-btn" type="button">点击开始 AR</button>
  </div>

  <div id="script-load-fail" style="display:none;position:fixed;inset:0;z-index:100;padding:24px 20px;background:#1a1a1a;color:#fff;font-size:15px;line-height:1.55;overflow:auto;">
    <p style="margin:0 0 12px;"><strong>页面脚本未能加载</strong>（多为当前网络访问 GitHub Pages 不稳定或被拦截）。</p>
    <p style="margin:0 0 12px;opacity:0.9;">可尝试：切换 <strong>移动数据</strong> / 其它 Wi‑Fi、关闭代理后再刷新；若在微信内，请点右上角 <strong>在浏览器中打开</strong>。</p>
    <p style="margin:0;opacity:0.85;font-size:14px;">也可将本站镜像到国内可访问的 Pages（如 Gitee / Cloudflare Pages）后使用新地址。</p>
  </div>

  <button id="close-btn" type="button">关闭当前显示</button>

  <script>
    window.__museumArScriptFail = function () {
      var el = document.getElementById("script-load-fail");
      if (el) el.style.display = "block";
    };
  </script>
  <script src="./vendor/three.min.js" onerror="__museumArScriptFail()"></script>
  <script src="./vendor/ar.js" onerror="__museumArScriptFail()"></script>
  <script src="./vendor/ar-threex.js" onerror="__museumArScriptFail()"></script>
  <script>
    (function () {
      const TOTAL_TARGETS = 124;
      const URL_PARAMS = new URLSearchParams(window.location.search);
      const AR_DEBUG = URL_PARAMS.get("debug") === "1";
      const SHOW_DIAG = URL_PARAMS.get("diag") === "1";
      const SHOW_SCAN_HINT = AR_DEBUG || URL_PARAMS.get("hint") === "1" || SHOW_DIAG;

      /** ?only=096 时返回 "096"，供底部提示用 */
      function onlyModePaddedId() {
        const raw = new URLSearchParams(window.location.search).get("only");
        if (raw === null || raw === "") return null;
        const n = parseInt(raw, 10);
        if (Number.isNaN(n) || n < 1 || n > TOTAL_TARGETS) return null;
        return String(n).padStart(3, "0");
      }
      let arDebugLastVisible = null;
      let scanHintFrame = 0;
      let nftLoadSignalCount = 0;
      let arjsVideoLoadedCount = 0;
      window.addEventListener("arjs-nft-loaded", function () {
        nftLoadSignalCount += 1;
      });
      window.addEventListener("arjs-video-loaded", function () {
        arjsVideoLoadedCount += 1;
      });

      /** 站点子路径前缀，如 museum/；避免 …/museum?xx 时相对 URL 错到根目录 */
      function siteDirectoryPrefix() {
        const path = new URL(window.location.href).pathname;
        const segs = path.split("/").filter(Boolean);
        if (segs.length > 0 && segs[segs.length - 1].indexOf(".") >= 0) {
          segs.pop();
        }
        const prefix = segs.join("/");
        return prefix ? prefix + "/" : "";
      }

      (function ensureWorkerCameraUrl() {
        // Worker 内 fetch 相对路径会相对于 blob/worker 根，易错；必须用整站绝对 URL
        window.__ARJS_WORKER_CAMERA_PATH = new URL(
          siteDirectoryPrefix() + "vendor/camera_para.dat",
          window.location.origin + "/"
        ).href;
      })();

      /** NFT 描述文件基址（无后缀），供 Worker fetch；须为绝对 URL */
      function nftDescriptorsAbsoluteBase(id) {
        const rel = siteDirectoryPrefix() + "images/" + id;
        return new URL(rel, window.location.origin + "/").href;
      }

      function displayJpgAbsoluteUrl(id) {
        const n = typeof id === "number" ? id : parseInt(String(id), 10);
        const rel = siteDirectoryPrefix() + "display/" + pad3(n) + ".jpg";
        return new URL(rel, window.location.origin + "/").href;
      }

      /** NFT 数量多时降低检测帧率，减轻多 Worker 积压（否则易「有画面但不识别」）。 */
      function nftDetectionRate(markerCount) {
        if (markerCount <= 1) return 30;
        if (markerCount <= 8) return 24;
        if (markerCount <= 24) return 16;
        return 12;
      }

      /**
       * 同时注册的 NFT 过多时手机易 OOM；地址 ?max=N 可强制数量（1–124）。
       * ?only=7 或 ?only=007：只注册单张，用于电脑端排查识别。
       * 未指定时：手机默认少量加载防崩溃；桌面默认加载全部（?max= 可缩小）。
       */
      function getTargetIdsToLoad() {
        const params = new URLSearchParams(window.location.search);
        const onlyRaw = params.get("only");
        if (onlyRaw !== null && onlyRaw !== "") {
          const n = parseInt(onlyRaw, 10);
          if (!Number.isNaN(n) && n >= 1 && n <= TOTAL_TARGETS) {
            return [pad3(n)];
          }
        }
        const raw = params.get("max");
        let cap = TOTAL_TARGETS;
        if (raw !== null && raw !== "") {
          const n = parseInt(raw, 10);
          if (!Number.isNaN(n)) cap = Math.min(TOTAL_TARGETS, Math.max(1, n));
        } else {
          const narrow = window.matchMedia("(max-width: 768px)").matches;
          const coarse = window.matchMedia("(pointer: coarse)").matches;
          if (narrow || coarse) {
            const gb =
              typeof navigator.deviceMemory === "number" ? navigator.deviceMemory : 0;
            // 很多手机不提供 deviceMemory（gb=0），仍用 32 个 NFT 易 OOM 直接崩溃，默认改小
            if (gb === 0) cap = Math.min(TOTAL_TARGETS, 8);
            else if (gb >= 8) cap = Math.min(TOTAL_TARGETS, 124);
            else if (gb >= 6) cap = Math.min(TOTAL_TARGETS, 64);
            else if (gb >= 4) cap = Math.min(TOTAL_TARGETS, 32);
            else cap = Math.min(TOTAL_TARGETS, 12);
          } else {
            // 桌面默认加载全部编号，避免「扫 041 以后永远无反应」被误认为坏了；若卡顿可手动加 ?max=40 等缩小范围
            cap = TOTAL_TARGETS;
          }
        }
        const ids = [];
        for (let i = 1; i <= cap; i += 1) ids.push(pad3(i));
        return ids;
      }

      const TARGET_IDS = [];
      const MARKER_ROOTS = [];
      const PANEL_GROUPS = [];
      const MANUAL_HIDDEN = new Set();
      let activeId = null;
      let renderer;
      let scene;
      let camera;
      let arSource;
      let arContext;
      let rafId = 0;

      const loadingEl = document.getElementById("loading");
      const progressBarEl = document.getElementById("progress-bar");
      const progressLabelEl = document.getElementById("progress-label");
      const closeBtnEl = document.getElementById("close-btn");
      const containerEl = document.getElementById("ar-container");
      const loadingTextEl = document.getElementById("loading-text");
      const bootEl = document.getElementById("boot");
      const startBtnEl = document.getElementById("start-btn");
      const screenPanelEl = document.getElementById("ar-screen-panel");
      const screenImgEl = document.getElementById("ar-screen-img");
      const screenErrEl = document.getElementById("ar-screen-err");
      let displayOverlayBlobUrl = null;
      let displayImgReqToken = 0;

      function pad3(num) {
        return String(num).padStart(3, "0");
      }

      function updateProgress(current, total) {
        const percent = Math.min(100, Math.round((current / total) * 100));
        progressBarEl.style.width = percent + "%";
        progressLabelEl.textContent = current + " / " + total;
      }

      function hideLoading() {
        loadingEl.style.display = "none";
      }

      function showLoadingError(message) {
        loadingEl.style.display = "flex";
        loadingTextEl.textContent = message;
        progressLabelEl.textContent = "请在系统浏览器中打开并允许摄像头权限";
      }

      async function ensureCameraPermission() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          throw new Error("当前浏览器不支持摄像头接口，请改用手机系统浏览器");
        }
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" } },
          audio: false
        });
        stream.getTracks().forEach((track) => track.stop());
      }

      function showCloseButton(show) {
        closeBtnEl.style.display = show ? "block" : "none";
      }

      function buildDisplayPanel(texture) {
        const panelGroup = new THREE.Group();
        panelGroup.visible = false;
        // 略抬高、沿法线前移，避免在画面外或贴图平面内被深度裁掉
        panelGroup.position.set(0, 0.45, 0.12);
        panelGroup.scale.set(2.2, 2.2, 2.2);

        const frameW = 1.2;
        const frameH = 0.9;
        const frameGeom = new THREE.PlaneGeometry(frameW, frameH);
        const frameMat = new THREE.MeshBasicMaterial({
          color: 0xffffff,
          transparent: true,
          opacity: 0.55,
          side: THREE.DoubleSide,
          depthTest: false,
          depthWrite: false
        });
        const frameMesh = new THREE.Mesh(frameGeom, frameMat);
        frameMesh.renderOrder = 10;
        frameMesh.frustumCulled = false;
        panelGroup.add(frameMesh);

        const borderGeom = new THREE.EdgesGeometry(frameGeom);
        const borderMat = new THREE.LineBasicMaterial({
          color: 0xffffff,
          transparent: true,
          opacity: 0.95,
          depthTest: false,
          depthWrite: false
        });
        const border = new THREE.LineSegments(borderGeom, borderMat);
        border.renderOrder = 11;
        border.position.z = 0.002;
        panelGroup.add(border);

        const imgMat = new THREE.MeshBasicMaterial({
          map: texture,
          transparent: true,
          opacity: 1,
          side: THREE.DoubleSide,
          depthTest: false,
          depthWrite: false
        });
        const imgGeom = new THREE.PlaneGeometry(1.05, 0.75);
        const imgMesh = new THREE.Mesh(imgGeom, imgMat);
        imgMesh.position.z = 0.004;
        imgMesh.renderOrder = 12;
        imgMesh.frustumCulled = false;
        panelGroup.add(imgMesh);

        return panelGroup;
      }

      function yieldToPaint() {
        return new Promise((resolve) => {
          requestAnimationFrame(() => requestAnimationFrame(resolve));
        });
      }

      /** 启动前检查首个 NFT 是否可访问；否则摄像头正常也会永远识别不到。 */
      async function assertNftFileNotLfsPointer(url, labelForError) {
        const res = await fetch(url, { cache: "no-store" });
        if (!res.ok) return;
        const buf = await res.arrayBuffer();
        if (buf.byteLength < 400) {
          const head = new TextDecoder("utf-8", { fatal: false }).decode(
            new Uint8Array(buf, 0, Math.min(200, buf.byteLength))
          );
          if (head.indexOf("git-lfs.github.com/spec") !== -1) {
            throw new Error(
              labelForError +
                " 在线上只是 Git LFS 指针小文件，不是真实识别数据，手机永远会「尚未识别」。请在电脑用 git lfs push 把大文件推上去，或不用 LFS、直接把完整 .fset/.fset3/.iset 提交进仓库。"
            );
          }
        }
      }

      async function assertNftArtifactsReachable(sampleId) {
        const exts = [".fset", ".fset3", ".iset"];
        for (let e = 0; e < exts.length; e += 1) {
          const u = nftDescriptorsAbsoluteBase(sampleId) + exts[e];
          let res = await fetch(u, { method: "HEAD", cache: "no-store" });
          if (res.status === 405 || res.status === 501) {
            res = await fetch(u, { method: "GET", cache: "no-store" });
          }
          if (!res.ok) {
            throw new Error(
              "NFT 数据无法访问 " +
                u +
                "（HTTP " +
                res.status +
                "）。请确认已部署 images 下 .fset/.fset3/.iset；若手机提示无法打开整站，多为网络访问 github.io 受阻，请换网络或镜像部署。"
            );
          }
          if (exts[e] === ".fset") {
            await assertNftFileNotLfsPointer(u, u);
          }
        }
      }

      async function buildTargets(targetIds) {
        const texLoader = new THREE.TextureLoader();
        const loadTexture = (url) =>
          new Promise((resolve) => {
            texLoader.load(
              url,
              (tex) => {
                tex.minFilter = THREE.LinearFilter;
                tex.magFilter = THREE.LinearFilter;
                resolve(tex);
              },
              undefined,
              () => {
                const fallback = new THREE.CanvasTexture(document.createElement("canvas"));
                resolve(fallback);
              }
            );
          });

        const batchSize = 8;
        const textures = [];
        loadingTextEl.textContent = "加载展示图片（并行）...";
        updateProgress(0, targetIds.length);
        await yieldToPaint();

        for (let i = 0; i < targetIds.length; i += batchSize) {
          const slice = targetIds.slice(i, i + batchSize);
          const batch = await Promise.all(
            slice.map((id) => loadTexture(displayJpgAbsoluteUrl(id)))
          );
          for (let j = 0; j < batch.length; j += 1) {
            textures.push(batch[j]);
          }
          updateProgress(textures.length, targetIds.length);
          await yieldToPaint();
        }

        loadingTextEl.textContent = "初始化 NFT 识别（较慢，请稍候）...";
        for (let i = 0; i < targetIds.length; i += 1) {
          const id = targetIds[i];
          const numericId = Number(id);
          loadingTextEl.textContent = "注册识别图 " + id + " (" + (i + 1) + "/" + targetIds.length + ")";
          updateProgress(i, targetIds.length);
          await yieldToPaint();

          const markerRoot = new THREE.Group();
          scene.add(markerRoot);
          MARKER_ROOTS.push(markerRoot);
          TARGET_IDS.push(numericId);

          new THREEx.ArMarkerControls(arContext, markerRoot, {
            type: "nft",
            descriptorsUrl: nftDescriptorsAbsoluteBase(id)
          });

          const panel = buildDisplayPanel(textures[i]);
          markerRoot.add(panel);
          PANEL_GROUPS.push(panel);

          updateProgress(i + 1, targetIds.length);
        }
      }

      function hideAllPanels() {
        for (let i = 0; i < PANEL_GROUPS.length; i += 1) {
          PANEL_GROUPS[i].visible = false;
        }
      }

      function pickVisibleId() {
        for (let i = 0; i < MARKER_ROOTS.length; i += 1) {
          if (MARKER_ROOTS[i].visible) return TARGET_IDS[i] || null;
        }
        return null;
      }

      function setActive(id) {
        hideAllPanels();
        if (!id) {
          activeId = null;
          showCloseButton(false);
          displayImgReqToken += 1;
          if (displayOverlayBlobUrl) {
            URL.revokeObjectURL(displayOverlayBlobUrl);
            displayOverlayBlobUrl = null;
          }
          if (screenPanelEl) {
            screenPanelEl.classList.remove("is-visible");
            screenPanelEl.style.display = "none";
            screenPanelEl.setAttribute("aria-hidden", "true");
          }
          if (screenImgEl) {
            screenImgEl.removeAttribute("src");
            screenImgEl.onload = null;
            screenImgEl.onerror = null;
          }
          if (screenErrEl) {
            screenErrEl.style.display = "none";
            screenErrEl.textContent = "";
          }
          return;
        }
        activeId = id;
        const numForPanel = typeof id === "number" ? id : parseInt(String(id), 10);
        const panelIdx = TARGET_IDS.indexOf(numForPanel);
        if (panelIdx >= 0 && PANEL_GROUPS[panelIdx]) {
          PANEL_GROUPS[panelIdx].visible = true;
        }
        if (screenPanelEl && screenImgEl) {
          displayImgReqToken += 1;
          const token = displayImgReqToken;
          const url = displayJpgAbsoluteUrl(id);
          screenPanelEl.classList.add("is-visible");
          screenPanelEl.style.display = "flex";
          screenPanelEl.setAttribute("aria-hidden", "false");
          if (screenErrEl) {
            screenErrEl.style.display = "none";
            screenErrEl.textContent = "";
          }
          const n = typeof id === "number" ? id : parseInt(String(id), 10);
          screenImgEl.alt = "展品 " + pad3(n) + " 说明图";
          screenImgEl.style.display = "block";
          if (displayOverlayBlobUrl) {
            URL.revokeObjectURL(displayOverlayBlobUrl);
            displayOverlayBlobUrl = null;
          }
          screenImgEl.src = url;
          void (async function () {
            try {
              const res = await fetch(url, { cache: "force-cache", credentials: "same-origin" });
              if (!res.ok || token !== displayImgReqToken) return;
              const blob = await res.blob();
              if (token !== displayImgReqToken || !blob || blob.size < 32) return;
              if (displayOverlayBlobUrl) {
                URL.revokeObjectURL(displayOverlayBlobUrl);
              }
              displayOverlayBlobUrl = URL.createObjectURL(blob);
              if (token !== displayImgReqToken) return;
              screenImgEl.src = displayOverlayBlobUrl;
            } catch (e) {
              /* 保留上面已设的直连 src */
            }
          })();
        }
        showCloseButton(true);
      }

      function onResize() {
        if (!arSource || !renderer || !arContext) return;
        arSource.onResizeElement();
        arSource.copyElementSizeTo(renderer.domElement);
        if (arContext.arController) {
          arSource.copyElementSizeTo(arContext.arController.canvas);
        }
      }

      function animate() {
        rafId = requestAnimationFrame(animate);
        if (arSource.ready) {
          arContext.update(arSource.domElement);
        }

        const visibleId = pickVisibleId();
        if (AR_DEBUG && visibleId !== arDebugLastVisible) {
          arDebugLastVisible = visibleId;
          console.log("[MuseumAR] 当前可见标记编号:", visibleId);
        }
        if (SHOW_SCAN_HINT) {
          scanHintFrame += 1;
          if (scanHintFrame % 6 === 0) {
            const hintEl = document.getElementById("scan-hint");
            if (hintEl) {
              const vid = arSource && arSource.domElement;
              const vw = vid && vid.videoWidth ? vid.videoWidth : 0;
              const vh = vid && vid.videoHeight ? vid.videoHeight : 0;
              const onlyPad = onlyModePaddedId();
              let line1 = visibleId
                ? "已识别到编号 " + pad3(visibleId)
                : onlyPad
                  ? "尚未识别：本页只认 " +
                    onlyPad +
                    " 号。摄像头里必须是「和官网展品图同一张」——请用另一台手机/电脑全屏打开顶栏里的那张图再扫；约半米远、少手抖、避开反光。"
                  : "尚未识别：图要大、要亮；横屏试试。若扫大号展品，请看顶栏是否只加载到更小编号——需加 ?max=124 或 ?only=编号";
              let line2 = "";
              if (SHOW_DIAG) {
                line2 =
                  " | 视频就绪×" +
                  arjsVideoLoadedCount +
                  " | NFT加载×" +
                  nftLoadSignalCount +
                  " | 画面 " +
                  vw +
                  "×" +
                  vh +
                  (vw < 2 || vh < 2 ? "（0=没出画）" : "");
              }
              hintEl.textContent = line1 + line2;
            }
          }
        }
        if (visibleId && visibleId !== activeId) {
          MANUAL_HIDDEN.delete(visibleId);
          setActive(visibleId);
        } else if (visibleId && activeId === visibleId && MANUAL_HIDDEN.has(visibleId)) {
          setActive(null);
        } else if (
          visibleId &&
          activeId === visibleId &&
          screenPanelEl &&
          !MANUAL_HIDDEN.has(visibleId) &&
          !screenPanelEl.classList.contains("is-visible")
        ) {
          // 叠层与识别状态偶发不同步时补一次，避免「已识别但无白框/无说明图」
          setActive(visibleId);
        }
        // 不在「未识别」时每帧 setActive(null)：NFT 易抖动，会把白框/说明图立刻关掉

        renderer.render(scene, camera);
      }

      async function init() {
        await ensureCameraPermission();
        scene = new THREE.Scene();
        camera = new THREE.Camera();
        scene.add(camera);

        const touchLike = window.matchMedia("(pointer: coarse)").matches;
        renderer = new THREE.WebGLRenderer({
          antialias: !touchLike,
          alpha: true,
          powerPreference: touchLike ? "default" : "high-performance"
        });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0);
        containerEl.appendChild(renderer.domElement);

        arSource = new THREEx.ArToolkitSource({
          sourceType: "webcam"
        });

        const camUrl = new URL("vendor/camera_para.dat", window.location.href).href;
        const camRes = await fetch(camUrl, { cache: "force-cache" });
        if (!camRes.ok) {
          throw new Error("无法加载 " + camUrl + "（HTTP " + camRes.status + "），请确认已 git push vendor/camera_para.dat");
        }
        const cameraParametersData = new Uint8Array(await camRes.arrayBuffer());

        const targetIds = getTargetIdsToLoad();
        if (targetIds.length === 0) {
          throw new Error("未找到可用识别文件，请先生成 images/*.fset 文件");
        }

        arContext = new THREEx.ArToolkitContext({
          // 传入 Uint8Array 时 AR.js 内部不再发 HTTP 请求，可避免误用 raw.githubusercontent.com 等失效地址
          // 固定 640×480：改大会与相机标定/AR.js NFT 管线不匹配，曾导致单张模式也无法识别
          cameraParametersUrl: cameraParametersData,
          detectionMode: "mono",
          maxDetectionRate: nftDetectionRate(targetIds.length),
          canvasWidth: 640,
          canvasHeight: 480
        });

        await new Promise((resolve, reject) => {
          const t = setTimeout(() => {
            reject(new Error("AR 引擎初始化超时，请刷新重试或换 Chrome。"));
          }, 90000);
          arContext.init(() => {
            clearTimeout(t);
            camera.projectionMatrix.copy(arContext.getProjectionMatrix());
            resolve();
          });
        });

        const tipEl = document.getElementById("top-tip");
        const pageParams = new URLSearchParams(window.location.search);
        const scanHintEl = document.getElementById("scan-hint");
        if (SHOW_SCAN_HINT && scanHintEl) {
          scanHintEl.style.display = "block";
        }
        if (pageParams.get("only")) {
          const sampleImg = new URL("display/" + targetIds[0] + ".jpg", window.location.href).href;
          tipEl.innerHTML =
            "本页<strong>只识别 " +
            targetIds[0] +
            " 号</strong>。请用另一台设备<strong>全屏打开</strong>下面这张图，再拿本机去扫：<br><span style=\"font-size:12px;word-break:break-all;opacity:0.9\">" +
            sampleImg +
            "</span><br><span style=\"font-size:13px;opacity:0.88\">状态条：<code style=\"font-size:12px\">&amp;hint=1</code>；排查：<code style=\"font-size:12px\">&amp;diag=1</code>（一起看）</span>";
        } else if (targetIds.length < TOTAL_TARGETS) {
          const lastId = targetIds[targetIds.length - 1];
          tipEl.innerHTML =
            "请扫描展品图（<strong>仅编号 001–" +
            lastId +
            "</strong> 已加载；大于 " +
            lastId +
            " 的图<strong>当前页不会识别</strong>）" +
            '<br><span style="font-size:13px;opacity:0.88;font-weight:normal">要扫 <strong>096、119</strong> 等：请在链接后加 <code style="font-size:12px">?max=124</code>（手机可能较慢或占内存），或只测一张 <code style="font-size:12px">?only=096</code>。卡顿可改小数字如 <code style="font-size:12px">?max=40</code>。</span>';
        } else {
          tipEl.textContent = "请扫描展品图片查看细节";
        }
        updateProgress(0, targetIds.length);
        await assertNftArtifactsReachable(targetIds[0]);
        await buildTargets(targetIds);

        await new Promise((resolve, reject) => {
          let finished = false;
          const timer = setTimeout(() => {
            if (finished) return;
            finished = true;
            reject(new Error("摄像头初始化超时，请确认已允许相机权限，并使用系统浏览器打开链接"));
          }, 30000);

          arSource.init(() => {
            if (finished) return;
            finished = true;
            clearTimeout(timer);
            const v = arSource.domElement;
            if (v && v.parentNode) {
              containerEl.insertBefore(v, renderer.domElement);
              v.style.zIndex = "0";
              v.setAttribute("playsinline", "");
              v.setAttribute("webkit-playsinline", "");
              v.playsInline = true;
              v.muted = true;
              if (v.play) {
                v.play().catch(function () {});
              }
            }
            renderer.domElement.style.zIndex = "1";
            onResize();
            (function scheduleNftVideoKick() {
              const delays = [800, 2400, 5000];
              for (let k = 0; k < delays.length; k += 1) {
                setTimeout(function () {
                  if (nftLoadSignalCount > 0) return;
                  if (arjsVideoLoadedCount > 0) return;
                  const el = arSource && arSource.domElement;
                  if (!el) return;
                  const w = el.videoWidth || el.clientWidth || 0;
                  const h = el.videoHeight || el.clientHeight || 0;
                  if (w < 3 || h < 3) return;
                  window.dispatchEvent(
                    new CustomEvent("arjs-video-loaded", { detail: { component: el } })
                  );
                }, delays[k]);
              }
            })();
            resolve();
          });
        });

        hideLoading();
        animate();

        const nftProbeBase = nftDescriptorsAbsoluteBase(targetIds[0]);
        let nftWatchdogUiDone = false;
        setTimeout(async function () {
          if (nftLoadSignalCount > 0 || nftWatchdogUiDone) return;
          nftWatchdogUiDone = true;
          let extra = "";
          try {
            let res = await fetch(nftProbeBase + ".fset", { method: "HEAD", cache: "no-store" });
            if (res.status === 405 || res.status === 501) {
              res = await fetch(nftProbeBase + ".fset", { method: "GET", cache: "no-store" });
            }
            extra =
              "本机访问「" +
              nftProbeBase +
              ".fset」结果：<strong>HTTP " +
              res.status +
              "</strong>。" +
              (res.ok
                ? " 文件能连上，若计数仍为 0，请换 Chrome、关广告拦截后强刷。"
                : " 识别数据拉取失败，多为网络访问不了 GitHub Pages。");
          } catch (e) {
            extra =
              "本机连不上 NFT 文件（" +
              (e && e.message ? e.message : "网络错误") +
              "）。在大陆常见：请换 <strong>4G/5G</strong>、关代理，或将本站镜像到国内可访问地址。";
          }
          const block =
            '<br><br><span style="color:#ffb4b4;font-weight:700">提示：NFT 仍未加载完成（计数为 0）</span>——此时不会识别任何图。' +
            "<br>" +
            extra;
          if (tipEl) tipEl.innerHTML = (tipEl.innerHTML || "") + block;
        }, 10000);
      }

      closeBtnEl.addEventListener("click", () => {
        if (activeId) {
          MANUAL_HIDDEN.add(activeId);
        }
        setActive(null);
      });

      window.addEventListener("resize", onResize);
      window.addEventListener("orientationchange", () => {
        setTimeout(onResize, 200);
      });

      window.addEventListener("beforeunload", () => {
        if (rafId) cancelAnimationFrame(rafId);
      });

      startBtnEl.addEventListener("click", () => {
        bootEl.style.display = "none";
        startBtnEl.disabled = true;
        startBtnEl.textContent = "正在启动...";
        init().catch((err) => {
          const msg = String(err && err.message ? err.message : err);
          showLoadingError("初始化失败");
          progressLabelEl.textContent = msg;
          bootEl.style.display = "flex";
          startBtnEl.disabled = false;
          startBtnEl.textContent = "点击重试";
        });
      });
    })();
  </script>
</body>
</html>
